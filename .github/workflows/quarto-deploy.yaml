name: Quarto Render and Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'quarto/**'
      - 'R/**'
      - 'man/**'
      - 'inst/**'
      - 'data/**'
      - '.github/workflows/quarto-deploy.yaml'
  pull_request:
    branches: [main, master]
    paths:
      - 'quarto/**'
      - 'R/**'
      - 'man/**'
      - 'inst/**'
      - 'data/**'
      - '.github/workflows/quarto-deploy.yaml'
  workflow_dispatch:

concurrency:
  group: quarto-deploy-${{ github.event_name != 'pull_request' || github.run_id }}
  cancel-in-progress: true

jobs:
  quarto-render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: 'release'

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::knitr
            any::rmarkdown
            any::devtools
            any::dplyr
            any::purrr
            any::readxl
            any::openxlsx
            any::usethis
            any::credentials
            any::tidyr
            any::tibble
            any::ggplot2
            any::stringr
            any::jsonlite
            any::digest
            local::.
          needs: website

      - name: Validate generation success
        working-directory: ./quarto
        run: |
          ls -la _generated/ || echo "No _generated directory found"
          
          # Check if critical files were generated (even if empty, they should exist)
          echo "Checking for generated files..."
          
          # Verify the generation script ran successfully by checking metadata extraction
          echo "Validating metadata extraction..."
          Rscript -e "
          if (requireNamespace('goFlux', quietly = TRUE)) {
            exports <- getNamespaceExports('goFlux')
            import_funcs <- exports[grepl('^import\\\\.', exports)]
            cat('Found', length(exports), 'exported functions\\n')
            cat('Found', length(import_funcs), 'import functions\\n') 
            
            # Validate that at least some import functions are available
            if (length(import_funcs) > 0) {
              cat('✓ Import functions found:', length(import_funcs), '\\n')
            } else {
              cat('✗ No import functions found\\n')
              quit(status = 1)
            }
          } else {
            cat('✗ goFlux package not available\\n')
            quit(status = 1)
          }"

      - name: Validate examples
        working-directory: ./quarto
        run: Rscript _examples.R

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.27

      - name: Render Quarto project
        working-directory: ./quarto
        run: quarto render

      - name: Validate import sync report
        working-directory: ./quarto
        run: |
          if [ ! -f "_generated/import_sync_report.json" ]; then
            echo "✗ Missing _generated/import_sync_report.json"
            exit 1
          fi

          Rscript -e '
          # Load and validate report structure
          tryCatch({
            report <- jsonlite::fromJSON("_generated/import_sync_report.json")
            
            # Check required keys
            required_keys <- c("import_function_count", "documented_import_function_count", 
                              "unresolved_missing_import_docs", "classifications")
            missing_keys <- setdiff(required_keys, names(report))
            if (length(missing_keys) > 0) {
              cat("✗ Import sync report missing required keys:", paste(missing_keys, collapse=", "), "\n")
              quit(status = 1)
            }
            
            cat("Import functions:", report[["import_function_count"]], "\n")
            cat("Documented import functions:", report[["documented_import_function_count"]], "\n")
            cat("Unresolved missing import docs:", report[["unresolved_missing_import_docs"]], "\n")

            if (!is.null(report[["unresolved_missing_import_docs"]]) && report[["unresolved_missing_import_docs"]] > 0) {
              cat("✗ Build blocked: unresolved missing import docs found\n")
              quit(status = 1)
            }

            cat("✓ Import sync report validated successfully\n")
          }, error = function(e) {
            cat("✗ Failed to validate import sync report:\n")
            cat("  Error:", e$message, "\n")
            quit(status = 1)
          })
          '

      - name: Validate .qmd file integrity
        working-directory: ./quarto
        run: |
          echo "Validating markdown file integrity..."
          
          # Check for balanced code blocks in import.qmd
          if [ -f "import.qmd" ]; then
            backtick_count=$(grep -o "\`\`\`" import.qmd | wc -l)
            if [ $((backtick_count % 2)) -ne 0 ]; then
              echo "✗ import.qmd has unbalanced code blocks"
              exit 1
            fi
            echo "✓ import.qmd code blocks balanced"
          fi
          
          # Check for unclosed YAML frontmatter
          for qmd_file in *.qmd; do
            if grep -q "^---$" "$qmd_file"; then
              yaml_count=$(grep "^---$" "$qmd_file" | wc -l)
              if [ $yaml_count -lt 2 ]; then
                echo "✗ $qmd_file has incomplete YAML frontmatter"
                exit 1
              fi
            fi
          done
          
          echo "✓ All markdown files have proper syntax"

      - name: Validate site generation
        working-directory: ./quarto
        run: |
          echo "Validating Quarto site generation..."
          
          # Check if _site directory exists and contains files
          if [ -d "_site" ] && [ "$(ls -A _site)" ]; then
            echo "✓ _site directory exists and contains files"
            ls -la _site/
            
            # Check for key HTML files
            if [ -f "_site/index.html" ]; then
              echo "✓ index.html generated"
            else
              echo "✗ index.html missing"
              exit 1
            fi
            
            if [ -f "_site/import.html" ]; then
              echo "✓ import.html generated"
            else
              echo "✗ import.html missing"  
              exit 1
            fi
            
          else
            echo "✗ _site directory empty or missing"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: quarto/_site
          clean: true
          single-commit: false
name: Quarto Render and Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'quarto/**'
      - 'R/**'
      - 'man/**'
      - 'inst/**'
      - 'data/**'
      - '.github/workflows/quarto-deploy.yaml'
  pull_request:
    branches: [main, master]
    paths:
      - 'quarto/**'
      - 'R/**'
      - 'man/**'
      - 'inst/**'
      - 'data/**'
      - '.github/workflows/quarto-deploy.yaml'
  workflow_dispatch:

concurrency:
  group: quarto-deploy-${{ github.event_name != 'pull_request' || github.run_id }}
  cancel-in-progress: true

jobs:
  quarto-render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: 'release'

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::knitr
            any::rmarkdown
            any::devtools
            any::dplyr
            any::purrr
            any::readxl
            any::openxlsx
            any::usethis
            any::credentials
            any::tidyr
            any::tibble
            any::ggplot2
            any::stringr
            any::jsonlite
            local::.
          needs: website

      - name: Validate generation success
        working-directory: ./quarto
        run: |
          ls -la _generated/ || echo "No _generated directory found"
          
          # Check if critical files were generated (even if empty, they should exist)
          echo "Checking for generated files..."
          
          # Verify the generation script ran successfully by checking metadata extraction
          echo "Validating metadata extraction..."
          Rscript -e "
          if (requireNamespace('goFlux', quietly = TRUE)) {
            exports <- getNamespaceExports('goFlux')
            import_funcs <- exports[grepl('^import\\\\.', exports)]
            cat('Found', length(exports), 'exported functions\\n')
            cat('Found', length(import_funcs), 'import functions\\n') 
            
            # Validate that eosMX12 is included
            if ('import.eosMX12' %in% import_funcs) {
              cat('✓ eosMX12 function found\\n')
            } else {
              cat('✗ eosMX12 function missing\\n')
              quit(status = 1)
            }
          } else {
            cat('✗ goFlux package not available\\n')
            quit(status = 1)
          }"

      - name: Validate examples
        working-directory: ./quarto
        run: Rscript _examples.R
        continue-on-error: true

      - name: Generate documentation from R package
        working-directory: ./quarto
        run: Rscript _generate.R

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.27

      - name: Render Quarto project
        working-directory: ./quarto
        run: quarto render

      - name: Validate site generation
        working-directory: ./quarto
        run: |
          echo "Validating Quarto site generation..."
          
          # Check if _site directory exists and contains files
          if [ -d "_site" ] && [ "$(ls -A _site)" ]; then
            echo "✓ _site directory exists and contains files"
            ls -la _site/
            
            # Check for key HTML files
            if [ -f "_site/index.html" ]; then
              echo "✓ index.html generated"
            else
              echo "✗ index.html missing"
              exit 1
            fi
            
            if [ -f "_site/import.html" ]; then
              echo "✓ import.html generated"
            else
              echo "✗ import.html missing"  
              exit 1
            fi
            
          else
            echo "✗ _site directory empty or missing"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: quarto/_site
          clean: true
          single-commit: false